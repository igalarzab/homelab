title: Home Modern
views:
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 3
    badges:
      - type: entity
        entity: person.jose
        name: Iñaki
      - type: entity
        entity: sensor.unavailable_entities
        name: Devices
        color: red
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Weather
            icon: mdi:weather-partly-cloudy
          - type: weather-forecast
            entity: weather.forecast_home
            forecast_type: daily
            grid_options:
              columns: 12
      - type: grid
        cards:
          - type: heading
            heading: Quick Actions
            icon: mdi:gesture-tap-button
          - type: tile
            entity: input_button.vacuum_home
            name: Vacuum
            icon: mdi:robot-vacuum
            color: green
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.vacuum_home
            grid_options:
              columns: 6
          - type: tile
            entity: input_button.leave_home
            name: Leave Home
            icon: mdi:door-open
            color: orange
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.leave_home
            grid_options:
              columns: 6
          - type: tile
            entity: input_button.pre_cool_home
            name: Pre-Cool
            icon: mdi:snowflake
            color: cyan
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.pre_cool_home
            grid_options:
              columns: 4
          - type: tile
            entity: input_button.go_to_sleep
            name: Sleep
            icon: mdi:power-sleep
            color: indigo
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.go_to_sleep
            grid_options:
              columns: 4
          - type: tile
            entity: input_button.wake_up
            name: Wake Up
            icon: mdi:weather-sunny
            color: amber
            tap_action:
              action: call-service
              service: input_button.press
              target:
                entity_id: input_button.wake_up
            grid_options:
              columns: 4
      - type: grid
        cards:
          - type: heading
            heading: Doors
            icon: mdi:door
          - type: tile
            entity: binary_sensor.entrance_door_contact
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.living_room_door_left_contact
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.living_room_door_right_contact
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.office_door_contact
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.bathroom_door_contact
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.bedroom_door_contact
            grid_options:
              columns: 6
      - type: grid
        cards:
          - type: heading
            heading: Windows
            icon: mdi:window-closed-variant
          - type: tile
            entity: binary_sensor.office_window_centre_contact
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.office_window_right_contact
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.bedroom_window_left_contact
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.bedroom_window_right_contact
            grid_options:
              columns: 6
      - type: grid
        cards:
          - type: heading
            heading: Presence
            icon: mdi:motion-sensor
          - type: tile
            entity: binary_sensor.entrance_motion_occupancy
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.kitchen_motion_occupancy
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.office_hub_presence
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.bathroom_motion_occupancy
            grid_options:
              columns: 6
          - type: tile
            entity: binary_sensor.bedroom_motion_occupancy
            grid_options:
              columns: 6

  - title: Living Room
    path: living-room
    icon: mdi:sofa
    type: sections
    max_columns: 3
    badges:
      - type: entity
        entity: sensor.living_room_thermometer_temperature
        color: orange
      - type: entity
        entity: sensor.living_room_thermometer_humidity
        color: cyan
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Environment
            icon: mdi:home-thermometer
          - type: tile
            entity: sensor.living_room_thermometer_temperature
            name: Temperature
            color: orange
            features:
              - type: trend-graph
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.living_room_thermometer_humidity
            name: Humidity
            color: cyan
            features:
              - type: trend-graph
            grid_options:
              columns: 6
      - type: grid
        cards:
          - type: heading
            heading: Lights
            icon: mdi:lightbulb-group
          - type: tile
            entity: switch.entrance_controller_wall_gang_left
            name: Entrance
            icon: mdi:lightbulb
            color: amber
            grid_options:
              columns: 6
          - type: tile
            entity: switch.living_room_controller_wall_gang_one
            name: Dining Table
            icon: mdi:lightbulb
            color: amber
            grid_options:
              columns: 6
          - type: tile
            entity: switch.living_room_controller_wall_gang_two
            name: Sofa
            icon: mdi:lightbulb
            color: amber
            grid_options:
              columns: 6
          - type: tile
            entity: switch.living_room_controller_wall_gang_three
            name: Hall
            icon: mdi:lightbulb
            color: amber
            grid_options:
              columns: 6
          - type: tile
            entity: light.living_room_tv_lightstrip
            name: TV Lights
            icon: mdi:led-strip-variant
            color: purple
            features:
              - type: light-brightness
            grid_options:
              columns: 12
      - type: grid
        cards:
          - type: heading
            heading: Curtains
            icon: mdi:curtains
          - type: tile
            entity: cover.living_room_curtains
            name: Curtains
            features:
              - type: cover-open-close
              - type: cover-position
            grid_options:
              columns: 12
      - type: grid
        cards:
          - type: heading
            heading: Climate
            icon: mdi:air-conditioner
          - type: tile
            entity: climate.living_room_left_ac_controller
            name: Left AC
            features:
              - type: climate-hvac-modes
                hvac_modes:
                  - cool
                  - dry
                  - fan_only
                  - "off"
              - type: target-temperature
            grid_options:
              columns: 12
          - type: tile
            entity: climate.living_room_right_ac_controller
            name: Right AC
            features:
              - type: climate-hvac-modes
                hvac_modes:
                  - cool
                  - dry
                  - fan_only
                  - "off"
              - type: target-temperature
            grid_options:
              columns: 12
      - type: grid
        cards:
          - type: heading
            heading: Coffee Machine
            icon: mdi:coffee
          - type: tile
            entity: switch.kitchen_coffee_machine_plug
            name: Coffee Machine
            icon: mdi:coffee
            color: brown
            grid_options:
              columns: 12
          - type: tile
            entity: sensor.kitchen_coffee_machine_plug_power
            name: Power
            color: orange
            features:
              - type: trend-graph
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.kitchen_coffee_machine_plug_energy_today
            name: Energy Today
            color: green
            grid_options:
              columns: 6
      - type: grid
        cards:
          - type: heading
            heading: Media
            icon: mdi:multimedia
          - type: tile
            entity: media_player.living_room_speaker
            name: Speaker
            features:
              - type: media-player-volume-slider
            grid_options:
              columns: 12
          - type: tile
            entity: media_player.living_room_media_center
            name: Media Center
            features:
              - type: media-player-playback
              - type: media-player-volume-slider
            grid_options:
              columns: 12

