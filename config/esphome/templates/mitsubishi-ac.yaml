#
# Board Config
#

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"

esphome:
  name: ${name}
  area: ${area}
  friendly_name: ${friendly_name}

logger:
  level: INFO
  logs:
    mitsubishi_cn105: INFO
    mitsubishi_cn105.climate: INFO
    climate: WARN
    sensor: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

uart:
  id: HP_UART
  baud_rate: 2400
  tx_pin: GPIO17
  rx_pin: GPIO16
  data_bits: 8
  parity: EVEN
  stop_bits: 1

#
# Home Assistant
#

api:
  encryption:
    key: !secret ac_api_encryption_key

bluetooth_proxy:
  active: true

ota:
  - platform: esphome
    password: !secret ac_ota_password

sensor:
  - platform: uptime
    name: Uptime

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP
    ssid:
      name: SSID
  - platform: version
    name: Version
    hide_timestamp: true

button:
  - platform: restart
    name: Restart

climate:
  - platform: mitsubishi_cn105
    id: hp
    name: "Controller"
    icon: mdi:heat-pump
    uart_id: HP_UART
    update_interval: 1s
    current_temperature_min_interval: 60s
    visual:
      min_temperature: 16
      max_temperature: 31
      temperature_step:
        target_temperature: 1.0
        current_temperature: 0.5
